<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV Player — TV</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // On-screen error display for TV debugging (no console access)
      (function () {
        var overlay = null;
        function show(title, msg) {
          if (!overlay) {
            overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed;inset:0;background:#1a0000;color:#fff;font-family:monospace;font-size:18px;padding:40px;z-index:99999;overflow:auto;white-space:pre-wrap;word-break:break-all;";
            document.body.appendChild(overlay);
          }
          overlay.textContent = "[" + title + "]\n\n" + msg;
        }
        window.addEventListener("error", function (e) {
          show("JS ERROR", (e.message || "unknown") + "\n\nFile: " + e.filename + "\nLine: " + e.lineno + ":" + e.colno + "\n\n" + (e.error && e.error.stack ? e.error.stack : ""));
        });
        window.addEventListener("unhandledrejection", function (e) {
          var reason = e.reason;
          show("UNHANDLED PROMISE", reason && reason.stack ? reason.stack : String(reason));
        });
        setTimeout(function () {
          var root = document.getElementById("root");
          if (root && root.children.length === 0) {
            show("BLACK SCREEN", "Root is empty after 5s.\n\nUser agent: " + navigator.userAgent + "\n\nThis means React never mounted. Check errors above or try reloading.");
          }
        }, 5000);
      })();
    </script>
  </body>
</html>
